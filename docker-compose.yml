services:
  app:
    build: .
    container_name: policy-radar-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/sources').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3

  mcp_server:
    build: .
    container_name: policy-radar-mcp
    command: ["python", "-m", "mcp_server", "--sse", "--host", "0.0.0.0", "--port", "3001"]
    ports:
      - "3001:3001"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:3001/sse', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 3

  mock_wechat:
    build: .
    container_name: policy-radar-mock
    command: ["python", "-m", "mock", "--host", "0.0.0.0", "--port", "9999"]
    ports:
      - "9999:9999"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped

volumes: {}
