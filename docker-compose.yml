services:
  app:
    build: .
    container_name: policy-radar-app
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/sources').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3

  mcp_server:
    build: .
    container_name: policy-radar-mcp
    command: ["python", "-m", "mcp_server", "--sse", "--host", "0.0.0.0", "--port", "3001"]
    ports:
      - "3001:3001"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:3001/sse', timeout=2)"]
      interval: 30s
      timeout: 5s
      retries: 3

  mock_wechat:
    build: .
    container_name: policy-radar-mock
    command: ["python", "-m", "mock", "--host", "0.0.0.0", "--port", "9999"]
    ports:
      - "9999:9999"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: policy-radar-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    depends_on:
      - app
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: policy-radar-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
    volumes:
      - ./monitoring/grafana-datasource.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
      - ./monitoring/grafana-dashboard.json:/var/lib/grafana/dashboards/policy-radar.json:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes: {}
