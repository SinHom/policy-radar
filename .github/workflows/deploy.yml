name: Deploy to 1Panel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Setup SSH key (base64 decoded)
        run: |
          mkdir -p ~/.ssh
          # SSH_PRIVATE_KEY_B64 存 base64 编码的 private key，避免换行问题
          echo "${{ secrets.SSH_PRIVATE_KEY_B64 }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 22 -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
              root@${{ secrets.SERVER_HOST }} 'echo "SSH OK"'

      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
              root@${{ secrets.SERVER_HOST }} << 'ENDSSH'
          set -e
          cd /opt/policy-radar
          git pull origin main
          docker compose up -d --build
          sleep 10
          curl -sf http://127.0.0.1:8000/health | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          print('health:', d['status'])
          sys.exit(0 if d['status'] == 'ok' else 1)
          "
          echo "deploy done"
          ENDSSH
